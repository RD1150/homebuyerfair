services:
  - type: web
    name: homebuyerfair
    runtime: node
    region: oregon
    plan: starter
    buildCommand: NODE_ENV=production pnpm install && NODE_ENV=production pnpm build
    startCommand: node dist/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
