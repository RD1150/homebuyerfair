services:
  - type: web
    name: homebuyerfair
    runtime: node
    region: oregon
    plan: free
    buildCommand: pnpm install && pnpm build && node scripts/migrate.mjs
    startCommand: node dist/index.js
    healthCheckPath: /api/trpc/auth.me
    envVars:
      - key: NODE_ENV
        value: production
      - key: ADMIN_PASSWORD
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: homebuyerfair-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: VITE_APP_ID
        sync: false
      - key: OAUTH_SERVER_URL
        value: https://api.manus.im
      - key: VITE_OAUTH_PORTAL_URL
        value: https://manus.im
      - key: OWNER_OPEN_ID
        sync: false
      - key: OWNER_NAME
        sync: false
      - key: BUILT_IN_FORGE_API_URL
        sync: false
      - key: BUILT_IN_FORGE_API_KEY
        sync: false
      - key: VITE_FRONTEND_FORGE_API_KEY
        sync: false
      - key: VITE_FRONTEND_FORGE_API_URL
        sync: false

databases:
  - name: homebuyerfair-db
    databaseName: homebuyerfair
    user: homebuyerfair
    region: oregon
    plan: free
